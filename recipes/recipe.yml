---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: jbar-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bluefin
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      files:
        - https://negativo17.org/repos/fedora-nvidia-580.repo
        - https://repo.vivaldi.com/archive/vivaldi-fedora.repo
      copr:
        - alternateved/keyd
  - type: script
    snippets:
      - "dnf config-manager setopt fedora-nvidia-580.priority=85"

  - type: dnf
    install:
      packages:
        - akmods
        - nvidia-driver
        - nvidia-settings
        - nvidia-modprobe
        - https://macdriver.oss-us-west-1.aliyuncs.com/vktablet-3.5.10-2.x86_64.1.rpm # Pen tablet driver.
        - keyd
        - vivaldi-stable
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - gnome-tweaks

  - type: systemd
    system:
      enabled:
        - keyd.service

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - com.github.tchx84.Flatseal
          - it.mijorus.gearlever
          - io.github.flattool.Ignition
          - page.tesk.Refine
          - org.keepassxc.KeePassXC
          - org.mozilla.thunderbird_esr
      - scope: user # Also add Flathub user repo, but no user packages
        install:
          - com.super_productivity.SuperProductivity
          - com.valvesoftware.Steam
          - com.valvesoftware.Steam.CompatibilityTool.Proton-GE
          - io.bassi.Amberol
          - io.mgba.mGBA
          - net.kuribo64.melonDS
          - org.azahar_emu.Azahar
          - org.openttd.OpenTTD
          - org.taisei_project.Taisei

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
